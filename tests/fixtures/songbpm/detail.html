<!DOCTYPE html>
<html>
<head><title>SongBPM Detail Fixture</title></head>
<body>
  <!--
    Minimal-Fixture fuer extract_song_info:
    - h1 (Song-Titel), h2 (Artist)
    - dl/dt/dd-Paare fuer "Key", "Duration", "Tempo (BPM)"
    - div mit class="lg:prose-xl" als Vibe-Beschreibung
    - <a href> mit spotify.com/track als Spotify-Link
  -->

  <h1>Blinding Lights</h1>
  <h2>The Weeknd</h2>

  <dl>
    <dt>Key</dt>
    <dd>F# minor</dd>

    <dt>Duration</dt>
    <dd>3:20</dd>

    <dt>Tempo (BPM)</dt>
    <dd>171</dd>
  </dl>

  <div class="prose lg:prose-xl">
    This is an energetic, atmospheric synth-pop track with futuristic 80s vibes
    and an irresistible hook.
  </div>

  <a href="https://open.spotify.com/track/0VjIjW4GlUZAMYd2vXMi3b">Spotify</a>
</body>
</html>
